<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="no-referrer">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            // Get the Video ID or Search Query from the URL hash (#)
            var input = decodeURIComponent(window.location.hash.substring(1)) || 'dQw4w9WgXcQ';

            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'mute': 1,      // Essential to bypass the initial click requirement
                    'controls': 1,
                    'origin': window.location.origin,
                    'enablejsapi': 1
                },
                events: {
                    'onReady': function(event) {
                        // Use loadPlaylist for search or loadVideoById for direct IDs
                        if (input.length > 12) {
                            event.target.loadPlaylist({ listType: 'search', list: input });
                        } else {
                            event.target.loadVideoById(input);
                        }
                    },
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            // If the video is playing, force it to unmute
            if (event.data == YT.PlayerState.PLAYING) {
                event.target.unMute();
                event.target.setVolume(100);
            }

            // THE FIX: If YouTube pauses after an ad or transition, force it back to PLAY
            if (event.data == YT.PlayerState.PAUSED) {
                event.target.playVideo();
                event.target.unMute();
            }
        }

        // Allow song changes without page reload
        window.onhashchange = function() {
            var newInput = decodeURIComponent(window.location.hash.substring(1));
            if (player && newInput) {
                if (newInput.length > 12) {
                    player.loadPlaylist({ listType: 'search', list: newInput });
                } else {
                    player.loadVideoById(newInput);
                }
            }
        };
    </script>
</body>
</html>
