<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="no-referrer">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        var player;
        var breachInterval;

        function onYouTubeIframeAPIReady() {
            var input = decodeURIComponent(window.location.hash.substring(1)) || 'dQw4w9WgXcQ';
            
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'mute': 1, // MUST start muted for the browser to allow the process
                    'controls': 1,
                    'playsinline': 1,
                    'enablejsapi': 1,
                    'origin': window.location.origin
                },
                events: {
                    'onReady': function(event) {
                        loadContent(input);
                        startBreachLoop();
                    },
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function loadContent(query) {
            if (query.length > 12) {
                player.loadPlaylist({ listType: 'search', list: query });
            } else {
                player.loadVideoById(query);
            }
        }

        function startBreachLoop() {
            if (breachInterval) clearInterval(breachInterval);
            
            // High-frequency patrol (200ms) to detect and kill pauses
            breachInterval = setInterval(function() {
                if (player && player.getPlayerState) {
                    var s = player.getPlayerState();
                    
                    // Force PLAY if browser tries to pause (State 2) or ad finishes (State 5)
                    if (s === 2 || s === 5 || s === 0) {
                        player.playVideo();
                    }
                }
            }, 200);
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                // THE STEALH UNMUTE:
                // We wait 1500ms after the video starts. 
                // This bypasses the "Instant Pause" security check on Laptops.
                setTimeout(function() {
                    if (player.isMuted()) {
                        player.unMute();
                        player.setVolume(100);
                        console.log("Audio Wall Breached");
                    }
                }, 1500);
            }
        }

        window.onhashchange = function() {
            var newInput = decodeURIComponent(window.location.hash.substring(1));
            if (player && newInput) {
                loadContent(newInput);
            }
        };
    </script>
</body>
</html>
