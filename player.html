<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="no-referrer">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        var player;
        function onYouTubeIframeAPIReady() {
            var input = decodeURIComponent(window.location.hash.substring(1));
            
            player = new YT.Player('player', {
                height: '100%', 
                width: '100%',
                // We don't set videoId here to keep the player flexible
                playerVars: { 
                    'autoplay': 1, 
                    'controls': 1, 
                    'mute': 1, // MANDATORY: This tricks the browser into allowing autoplay
                    'origin': 'https://rodrenne.github.io',
                    'enablejsapi': 1
                },
                events: {
                    'onReady': function(event) {
                        // Search for the song
                        event.target.loadPlaylist({
                            listType: 'search',
                            list: input
                        });
                    },
                    'onStateChange': function(event) {
                        // THE MAGIC BIT: As soon as the video starts (State 1 = Playing)
                        if (event.data == YT.PlayerState.PLAYING) {
                            event.target.unMute(); // Now that it's already moving, we can turn sound on
                            event.target.setVolume(100);
                        }
                    }
                }
            });
        }

        window.onhashchange = function() {
            var newInput = decodeURIComponent(window.location.hash.substring(1));
            if (player && newInput) {
                player.loadPlaylist({
                    listType: 'search',
                    list: newInput
                });
            }
        };
    </script>
</body>
</html>
