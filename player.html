<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="no-referrer">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        var player;
        var checkInterval;

        function onYouTubeIframeAPIReady() {
            var input = decodeURIComponent(window.location.hash.substring(1)) || 'dQw4w9WgXcQ';
            
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'mute': 1, 
                    'controls': 1,
                    'origin': window.location.origin
                },
                events: {
                    'onReady': function(event) {
                        // Load based on input length (Search vs ID)
                        if (input.length > 12) {
                            event.target.loadPlaylist({ listType: 'search', list: input });
                        } else {
                            event.target.loadVideoById(input);
                        }
                        startPatrol();
                    },
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // The Patrol: This runs every 0.5 seconds to force playback and sound
        function startPatrol() {
            if (checkInterval) clearInterval(checkInterval);
            checkInterval = setInterval(function() {
                if (player && player.getPlayerState) {
                    var state = player.getPlayerState();
                    
                    // 2 = Paused, 5 = Cued, 0 = Ended. Force them all to PLAY.
                    if (state === 2 || state === 5 || state === 0) {
                        player.playVideo();
                    }
                    
                    // If it's playing but muted, force UNMUTE.
                    if (state === 1 && player.isMuted()) {
                        player.unMute();
                        player.setVolume(100);
                    }
                }
            }, 500);
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                event.target.unMute();
                event.target.setVolume(100);
            }
        }

        window.onhashchange = function() {
            var newInput = decodeURIComponent(window.location.hash.substring(1));
            if (player && newInput) {
                if (newInput.length > 12) {
                    player.loadPlaylist({ listType: 'search', list: newInput });
                } else {
                    player.loadVideoById(newInput);
                }
            }
        };
    </script>
</body>
</html>
