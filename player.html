<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            // Decodes the song name from the URL hash (#)
            var query = decodeURIComponent(window.location.hash.substring(1));
            
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'controls': 1,
                    'mute': 0,
                    'modestbranding': 1,
                    'origin': 'https://rodrenne.github.io' 
                },
                events: {
                    'onReady': function(event) {
                        // CUE instead of LOAD provides a more stable handshake
                        event.target.cuePlaylist({
                            listType: 'search',
                            list: query
                        });
                    },
                    'onStateChange': function(event) {
                        // Once the search results are ready (CUED), hit PLAY automatically
                        if (event.data == YT.PlayerState.CUED) {
                            event.target.playVideo();
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
