<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="no-referrer">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        var player;
        function onYouTubeIframeAPIReady() {
            var input = decodeURIComponent(window.location.hash.substring(1));
            
            player = new YT.Player('player', {
                height: '100%', width: '100%',
                playerVars: { 
                    'autoplay': 1, 
                    'controls': 1, 
                    'mute': 1, // Stay muted to keep the "Autoplay" permission active
                    'origin': 'https://rodrenne.github.io' 
                },
                events: {
                    'onReady': function(event) {
                        event.target.loadPlaylist({
                            listType: 'search',
                            list: input
                        });
                    },
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            // State 1 = Playing. 
            // We trigger unMute and Play every time the state changes to "Playing"
            // This handles the transition from Ad -> Video automatically.
            if (event.data == YT.PlayerState.PLAYING) {
                event.target.unMute();
                event.target.setVolume(100);
            }
            
            // If the video pauses itself (common after an ad), force it back to play
            if (event.data == YT.PlayerState.PAUSED) {
                event.target.playVideo();
                event.target.unMute();
            }
        }

        window.onhashchange = function() {
            var newInput = decodeURIComponent(window.location.hash.substring(1));
            if (player && newInput) {
                player.loadPlaylist({ listType: 'search', list: newInput });
            }
        };
    </script>
</body>
</html>
