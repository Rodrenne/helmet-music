<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="no-referrer">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #player { width: 100%; height: 100%; pointer-events: auto; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        var player;
        var bruteForceLoop;

        function onYouTubeIframeAPIReady() {
            var input = decodeURIComponent(window.location.hash.substring(1)) || 'dQw4w9WgXcQ';
            
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'mute': 1, 
                    'controls': 1,
                    'enablejsapi': 1,
                    'playsinline': 1,
                    'origin': window.location.origin
                },
                events: {
                    'onReady': function(event) {
                        loadContent(input);
                        startPolicyBreach();
                    },
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function loadContent(query) {
            if (query.length > 12) {
                player.loadPlaylist({ listType: 'search', list: query });
            } else {
                player.loadVideoById(query);
            }
        }

        function startPolicyBreach() {
            if (bruteForceLoop) clearInterval(bruteForceLoop);
            
            // High-speed "Hammer" (150ms)
            // This constantly fights the browser's attempt to pause the video
            bruteForceLoop = setInterval(function() {
                if (player && player.getPlayerState) {
                    var s = player.getPlayerState();
                    
                    // Force PLAY if browser tries to pause or ad is buffering
                    if (s === 2 || s === 5 || s === -1 || s === 0) {
                        player.playVideo();
                    }
                    
                    // The Breach: If playing, keep trying to unmute and set volume
                    if (s === 1) {
                        player.unMute();
                        player.setVolume(100);
                    }
                }
            }, 150); 
        }

        function onPlayerStateChange(event) {
            // Every time the video changes (Ad ends, Song starts), re-trigger play
            if (event.data !== YT.PlayerState.PLAYING) {
                event.target.playVideo();
            } else {
                event.target.unMute();
                event.target.setVolume(100);
            }
        }

        window.onhashchange = function() {
            var newInput = decodeURIComponent(window.location.hash.substring(1));
            if (player && newInput) {
                loadContent(newInput);
            }
        };
    </script>
</body>
</html>
