<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        var player;
        function onYouTubeIframeAPIReady() {
            // Get the ID after the # (e.g., player.html#jAgq_32t_Hk)
            var videoId = window.location.hash.substring(1);
            
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: videoId, // Direct ID loading
                playerVars: {
                    'autoplay': 1,
                    'controls': 1,
                    'mute': 0,
                    'origin': 'https://rodrenne.github.io'
                },
                events: {
                    'onReady': function(event) {
                        event.target.playVideo();
                    }
                }
            });
        }

        // Allows the app to change songs without reloading the whole page
        window.onhashchange = function() {
            var newId = window.location.hash.substring(1);
            if (player && newId) {
                player.loadVideoById(newId);
            }
        };
    </script>
</body>
</html>
