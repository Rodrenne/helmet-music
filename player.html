<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="no-referrer">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #player { width: 100%; height: 100%; pointer-events: none; } /* Prevents accidental clicks */
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        var player;
        var bruteForceLoop;

        function onYouTubeIframeAPIReady() {
            var input = decodeURIComponent(window.location.hash.substring(1)) || 'dQw4w9WgXcQ';
            
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'mute': 1, // Start muted to satisfy the initial security check
                    'controls': 1,
                    'origin': window.location.origin,
                    'enablejsapi': 1
                },
                events: {
                    'onReady': function(event) {
                        loadContent(input);
                        // Start the high-speed "Security Breach" loop
                        breachSecurity();
                    },
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function loadContent(query) {
            if (query.length > 12) {
                player.loadPlaylist({ listType: 'search', list: query });
            } else {
                player.loadVideoById(query);
            }
        }

        function breachSecurity() {
            if (bruteForceLoop) clearInterval(bruteForceLoop);
            
            // Runs every 250ms to force the browser to accept the audio
            bruteForceLoop = setInterval(function() {
                if (player && player.getPlayerState) {
                    var s = player.getPlayerState();
                    
                    // Force playback if the browser tries to pause it
                    if (s === 2 || s === 5 || s === 0) {
                        player.playVideo();
                    }
                    
                    // Attempt to break the mute wall
                    if (s === 1) { 
                        player.unMute();
                        player.setVolume(100);
                        
                        // Verify if unmute actually worked. 
                        // If the browser blocked it, isMuted() will still be true.
                        if (!player.isMuted()) {
                            console.log("Security breached: Audio is live.");
                        }
                    }
                }
            }, 250);
        }

        function onPlayerStateChange(event) {
            // If it starts playing, immediately try to unmute
            if (event.data == YT.PlayerState.PLAYING) {
                event.target.unMute();
                event.target.setVolume(100);
            }
        }

        window.onhashchange = function() {
            var newInput = decodeURIComponent(window.location.hash.substring(1));
            if (player && newInput) {
                loadContent(newInput);
            }
        };
    </script>
</body>
</html>
