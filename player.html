<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            // This gets the song name OR ID from the URL hash (#)
            var input = decodeURIComponent(window.location.hash.substring(1));
            
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'controls': 1,
                    'mute': 0,
                    'modestbranding': 1,
                    'origin': 'https://rodrenne.github.io' 
                },
                events: {
                    'onReady': function(event) {
                        // TRY SEARCH FIRST, BUT WITH A CLEANER HANDSHAKE
                        event.target.loadPlaylist({
                            listType: 'search',
                            list: input
                        });
                    },
                    'onError': function(e) {
                        // If search fails (Error 153/Playback ID), try to load as direct ID
                        if (input.length <= 12) {
                             event.target.loadVideoById(input);
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
