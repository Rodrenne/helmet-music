<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="no-referrer">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            // We get the Video ID from the # link
            var vidId = window.location.hash.substring(1) || 'dQw4w9WgXcQ';

            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: vidId,
                playerVars: {
                    'autoplay': 1,
                    'mute': 1, // Start muted to bypass the "No Click" block
                    'controls': 0,
                    'origin': window.location.origin
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        function onPlayerStateChange(event) {
            // Once the video starts playing, we unmute it
            if (event.data == YT.PlayerState.PLAYING) {
                event.target.unMute();
                event.target.setVolume(100);
            }
        }
    </script>
</body>
</html>
