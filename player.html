<!DOCTYPE html>
<html>
<head>
    <meta name="referrer" content="no-referrer">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        var player;
        var patrolTick;

        function onYouTubeIframeAPIReady() {
            var input = decodeURIComponent(window.location.hash.substring(1)) || 'dQw4w9WgXcQ';
            
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'mute': 1, 
                    'controls': 1,
                    'playsinline': 1,
                    'origin': window.location.origin
                },
                events: {
                    'onReady': function(event) {
                        loadContent(input);
                        startPatrol();
                    },
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function loadContent(query) {
            if (query.length > 12) {
                player.loadPlaylist({ listType: 'search', list: query });
            } else {
                player.loadVideoById(query);
            }
        }

        function startPatrol() {
            if (patrolTick) clearInterval(patrolTick);
            patrolTick = setInterval(function() {
                if (player && player.getPlayerState) {
                    var state = player.getPlayerState();
                    
                    // If paused, ended, or cued—FORCE PLAY
                    if (state === 2 || state === 0 || state === 5) {
                        player.playVideo();
                    }
                    
                    // If playing but still muted, attempt to unmute
                    if (state === 1 && player.isMuted()) {
                        player.unMute();
                        player.setVolume(100);
                    }
                }
            }, 800); // 800ms is the "Sweet Spot" to bypass browser security
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                // Delayed unmute helps bypass the "Instant Pause" security trigger
                setTimeout(function() {
                    event.target.unMute();
                    event.target.setVolume(100);
                }, 500);
            }
        }

        window.onhashchange = function() {
            var newInput = decodeURIComponent(window.location.hash.substring(1));
            if (player && newInput) {
                loadContent(newInput);
            }
        };
    </script>
</body>
</html>
